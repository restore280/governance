name: Enforce Board Consent (restore280 Institute)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, review_requested, review_request_removed]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: write  # write required to post status comments

jobs:
  consent-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: .github
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Enforce unanimous board consent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # unanimous: true is set in voters.yml; this env var is a fallback override
          UNANIMOUS: "true"
        working-directory: .github
        run: node enforceApproval.js
