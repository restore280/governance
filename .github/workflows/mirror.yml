# .github/workflows/mirror-to-gist.yml
name: Mirror Markdown to Gist

on:
  push:
    branches:
      - main
    paths:
      - '**.md'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Mirror to Gist
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python - <<EOF
          import os
          from github import Github
          from pathlib import Path
          
          def update_gist():
              token = os.getenv('GITHUB_TOKEN')
              gist_id = os.getenv('GIST_ID')
              
              if not token or not gist_id:
                  raise ValueError("Missing required environment variables")
              
              g = Github(token)
              gist = g.get_gist(gist_id)
              
              # Get all markdown files
              files = {}
              for file_path in Path('.').rglob('*.md'):
                  # Skip files in .git directory and GitHub workflows
                  if '.git' in file_path.parts or '.github' in file_path.parts:
                      continue
                      
                  relative_path = str(file_path)
                  
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                      
                  files[relative_path] = {'content': content}
              
              # Update Gist
              gist.edit(files=files)
              print(f"Updated Gist: {gist.html_url}")
          
          update_gist()
          EOF
