name: Mirror BYLAWS to README (PR + merge as app)

on:
  push:
    paths: [BYLAWS.md]
  workflow_dispatch:

# These permissions are fine to keep; most calls will use the app token below.
permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # 1) Mint an installation token for your org Actions app
      - id: app-token
        name: Get GitHub App installation token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.BTL_ACTIONS_BOT_APP_ID }}            # <- 996645
          private_key: ${{ secrets.BTL_ACTIONS_BOT_PRIVATE_KEY }}  # PEM for the app
          # Either let the action find the installation for this repo...
          installation_retrieval_mode: repository
          installation_retrieval_payload: ${{ github.repository }}

      - name: Copy BYLAWS.md to README.md
        run: |
          test -f BYLAWS.md || { echo "BYLAWS.md not found"; exit 1; }
          cp BYLAWS.md README.md

      # 2) Open or update a PR as the app
      - id: cpr
        name: Create PR with README mirror
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: mirror BYLAWS.md to README.md"
          title: "Mirror BYLAWS.md to README.md"
          body: "Automated sync from BYLAWS.md."
          branch: chore/mirror-bylaws-to-readme
          delete-branch: true
          add-paths: README.md

      # 3) Merge the PR immediately using the app token
      - name: Merge PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          pr=${{ steps.cpr.outputs.pull-request-number }}
          echo "Merging PR #$pr"
          gh pr merge "$pr" --squash --delete-branch
