name: Mirror BYLAWS to README (PR + merge)

on:
  push:
    paths:
      - BYLAWS.md
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # Mint an installation token from your org GitHub App
      - id: app-token
        name: Get GitHub App installation token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.BTL_ACTIONS_APP_ID }}
          private_key: ${{ secrets.BTL_ACTIONS_BOT_PRIVATE_KEY }}

      - name: Copy BYLAWS.md to README.md
        run: |
          test -f BYLAWS.md || { echo "BYLAWS.md not found"; exit 1; }
          cp BYLAWS.md README.md

      - id: cpr
        name: Create PR with README mirror
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: mirror BYLAWS.md to README.md"
          title: "Mirror BYLAWS.md to README.md"
          body: "Automated sync from BYLAWS.md."
          branch: chore/mirror-bylaws-to-readme
          delete-branch: true
          add-paths: README.md

      # Merge immediately without --auto (auto-merge is disabled in repo settings)
      - name: Merge PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          pr=${{ steps.cpr.outputs.pull-request-number }}
          echo "Merging PR #$pr"
          # This will succeed once branch protection requirements (if any) are satisfied.
          gh pr merge "$pr" --squash --merge --delete-branch || {
            echo "Merge failed. Common causes:"
            echo " - Reviews are required by a ruleset or branch protection"
            echo " - Required checks are failing or pending"
            echo " - The app lacks permission on this repo"
            exit 1
          }
