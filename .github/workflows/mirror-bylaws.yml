name: Mirror BYLAWS to README (PR)

on:
  push:
    paths:
      - BYLAWS.md
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy BYLAWS.md to README.md
        run: |
          test -f BYLAWS.md || { echo "BYLAWS.md not found"; exit 1; }
          cp BYLAWS.md README.md

      - name: Create PR with README mirror
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: mirror BYLAWS.md to README.md"
          title: "Mirror BYLAWS.md to README.md"
          body: "Automated sync from BYLAWS.md."
          branch: chore/mirror-bylaws-to-readme
          delete-branch: true
          add-paths: README.md
