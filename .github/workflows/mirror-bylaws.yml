name: Mirror BYLAWS to README

on:
  push:
    paths:
      - BYLAWS.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy BYLAWS.md to README.md
        run: |
          test -f BYLAWS.md || { echo "BYLAWS.md not found"; exit 1; }
          cp BYLAWS.md README.md

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No changes to README.md"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: mirror BYLAWS.md to README.md [skip ci]"
          git push
